views:
  - type: sections
    path: ''
    max_columns: 2
    dense_section_placement: true
    title: Netz
    icon: mdi:transmission-tower
    cards: []
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: switch.SYSTEM_NAME_ems_automatikmodus
        name: EMS Automatik
        show_entity_picture: false
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.SYSTEM_NAME_autarkiegrad
        icon: mdi:sun-clock
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Netz- und PV-Leistung
            heading_style: title
            icon: mdi:transmission-tower
          - type: gauge
            entity: sensor.SYSTEM_NAME_netzleistung
            max: 13000
            needle: true
            severity:
              green: -7000
              yellow: 0
              red: 2500
            min: -7000
            grid_options:
              columns: 6
              rows: auto
          - type: gauge
            entity: sensor.SYSTEM_NAME_pv_leistung
            grid_options:
              columns: 6
              rows: auto
            needle: true
            max: 6880
          - type: gauge
            entity: sensor.SYSTEM_NAME_batterieleistung
            min: -7200
            max: 7200
            severity:
              green: 3500
              yellow: 0
              red: -7200
            grid_options:
              columns: 6
              rows: auto
            needle: true
          - type: gauge
            entity: sensor.SYSTEM_NAME_batterieladung
            needle: true
            severity:
              green: 75
              yellow: 25
              red: 0
            grid_options:
              columns: 6
              rows: auto
      - type: grid
        cards:
          - type: heading
            heading: Verbrauch
            heading_style: title
            icon: mdi:home-lightning-bolt-outline
          - type: gauge
            entity: sensor.SYSTEM_NAME_gesamtverbrauch
            max: 15000
            grid_options:
              columns: 12
              rows: auto
            needle: true
            severity:
              green: 0
              yellow: 1000
              red: 5000
          - type: gauge
            entity: sensor.SYSTEM_NAME_haushaltsverbrauch
            grid_options:
              columns: 3
              rows: auto
            max: 3600
            name: Haushalt
          - type: gauge
            entity: sensor.SYSTEM_NAME_warmepumpenleistung
            grid_options:
              columns: 3
              rows: auto
            name: Wärmepumpe
            max: 3500
          - type: gauge
            entity: sensor.SYSTEM_NAME_ladeleistung_fahrzeuge
            max: 11000
            grid_options:
              columns: 3
              rows: auto
            name: Wallbox
          - type: gauge
            entity: sensor.SYSTEM_NAME_klimaanlagenleistung
            name: Klimaanlage
            grid_options:
              columns: 3
              rows: auto
      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-box-outline
            heading: Energiebezug und -einspeisung
            heading_style: title
          - chart_type: bar
            period: day
            type: statistics-graph
            entities:
              - entity: sensor.SYSTEM_NAME_pv_energie
                name: PV
              - entity: sensor.SYSTEM_NAME_netzbezug_energie
                name: Netzbezug
              - entity: sensor.SYSTEM_NAME_eingespeiste_energie
                name: Einspeisung
            stat_types:
              - change
            grid_options:
              columns: 12
              rows: 5
            days_to_show: 7
          - type: heading
            icon: mdi:calendar-today
            heading: Energiebezug und -einspeisung - Heute
            heading_style: title
          - type: statistic
            entity: sensor.SYSTEM_NAME_netzbezug_energie
            period:
              calendar:
                period: day
            stat_type: change
            grid_options:
              columns: 12
              rows: 2
            name: Netzbezug
          - type: statistic
            entity: sensor.SYSTEM_NAME_pv_energie
            period:
              calendar:
                period: day
            stat_type: change
            name: PV
          - type: statistic
            entity: sensor.SYSTEM_NAME_eingespeiste_energie
            period:
              calendar:
                period: day
            stat_type: change
            name: Einspeisung
      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-box-outline
            heading: Energieverbrauch
            heading_style: title
          - chart_type: bar
            period: day
            type: statistics-graph
            entities:
              - entity: sensor.SYSTEM_NAME_gesamtverbrauch_energie
                name: Gesamt
              - entity: sensor.SYSTEM_NAME_haushaltsverbrauch_energie
                name: Haushalt
              - entity: sensor.SYSTEM_NAME_ladeenergie_fahrzeuge
                name: Wallbox
              - entity: sensor.SYSTEM_NAME_warmepumpenenergie
                name: Wärmepumpe
            stat_types:
              - change
            hide_legend: false
            logarithmic_scale: false
            days_to_show: 7
            grid_options:
              columns: 12
              rows: 5
          - type: heading
            icon: mdi:calendar-today
            heading: Energieverbrauch - Heute
            heading_style: title
          - type: statistic
            entity: sensor.SYSTEM_NAME_gesamtverbrauch_energie
            period:
              calendar:
                period: day
            stat_type: change
            name: Gesamt
          - type: statistic
            entity: sensor.SYSTEM_NAME_haushaltsverbrauch_energie
            period:
              calendar:
                period: day
            stat_type: change
            name: Haushalt
          - type: statistic
            entity: sensor.SYSTEM_NAME_ladeenergie_fahrzeuge
            period:
              calendar:
                period: day
            stat_type: change
            name: Wallbox
          - type: statistic
            entity: sensor.SYSTEM_NAME_warmepumpenenergie
            period:
              calendar:
                period: day
            stat_type: change
            name: Wärmepumpe
        column_span: 1

  - type: sections
    max_columns: 4
    icon: mdi:car-electric
    path: ev
    sections:
      - type: grid
        cards:
          - type: entities
            entities:
              - entity: select.CAR_IDENTIFIER_lademodus
          - type: entities
            entities:
              - entity: number.CAR_IDENTIFIER_fahrzeug_akkustand_manuell
                name: Akkustand aktuell
              - entity: number.CAR_IDENTIFIER_ziel_akkustand
                name: Zielakkustand
              - entity: time.CAR_IDENTIFIER_abfahrtzeit
                name: tägliche Abfahrtzeit
            visibility:
              - condition: state
                entity: sensor.CAR_IDENTIFIER_lademodus
                state: SMART_CHARGE
        column_span: 1

  - type: sections
    max_columns: 2
    icon: mdi:currency-eur
    path: preise-und-kosten
    title: Preise und Kosten
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Dynamische Strompreise
            heading_style: title
            icon: mdi:cash-multiple
          - type: entity
            entity: sensor.cheapest_future_hour
            name: Günstigste Zeit
          - type: entity
            entity: sensor.cheapest_future_price
            name: Günstigster Preis
          - graph: line
            type: sensor
            entity: sensor.SYSTEM_NAME_aktueller_strompreis
            detail: 1
            name: Aktuell
          - graph: line
            type: sensor
            entity: sensor.SYSTEM_NAME_durchschnittlicher_strompreis
            detail: 1
            name: Durchschnitt
          - graph: line
            type: sensor
            entity: sensor.SYSTEM_NAME_niedrigster_strompreis
            detail: 1
            name: Niedrigster
          - graph: line
            type: sensor
            entity: sensor.SYSTEM_NAME_hochster_strompreis
            detail: 1
            name: Höchster
      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-bar
            heading: Strompreisentwicklung
            heading_style: title
          - type: custom:apexcharts-card
            graph_span: 30h
            span:
              start: hour
            now:
              show: true
              label: Jetzt
            header:
              show: true
              show_states: true
              colorize_states: true
            yaxis:
              - min: auto
                decimals: 4
            series:
              - entity: sensor.SYSTEM_NAME_aktueller_strompreis
                name: Strompreis
                unit: EUR/kWh
                float_precision: 4
                type: column
                data_generator: |
                  return entity.attributes.forecast.map(e => [
                    new Date(e.start).getTime(),
                    e.price
                  ]);
                color_threshold:
                  - value: 0
                    color: '#4caf50'
                  - value: 0.22
                    color: '#ff9800'
                  - value: 0.33
                    color: '#f44336'
                show:
                  in_header: false
                  legend_value: false
                  name_in_header: false
              - entity: sensor.SYSTEM_NAME_aktueller_strompreis
                name: Aktuell
                unit: EUR/kWh
                float_precision: 4
                type: line
                stroke_width: 0
                show:
                  in_header: true
                  legend_value: true
                  name_in_header: true
      - type: grid
        cards:
          - type: heading
            heading: Stromkosten
            heading_style: title
            icon: mdi:account-arrow-right-outline
            grid_options:
              columns: 6
              rows: 1
          - type: heading
            icon: mdi:account-arrow-left-outline
            heading: Einspeisung
            heading_style: title
            grid_options:
              columns: 6
              rows: 1
          - type: statistic
            entity: sensor.SYSTEM_NAME_stromkosten
            period:
              calendar:
                period: day
            stat_type: change
            name: Heute
            icon: mdi:transmission-tower-import
          - type: statistic
            entity: sensor.SYSTEM_NAME_einspeisevergutung
            period:
              calendar:
                period: day
            stat_type: change
            name: Heute
          - type: statistic
            entity: sensor.SYSTEM_NAME_stromkosten
            period:
              calendar:
                period: month
            stat_type: change
            name: Dieser Monat
            icon: mdi:transmission-tower-import
          - type: statistic
            entity: sensor.SYSTEM_NAME_einspeisevergutung
            period:
              calendar:
                period: month
            stat_type: change
            name: Dieser Monat
          - type: statistic
            entity: sensor.SYSTEM_NAME_stromkosten
            period:
              calendar:
                period: year
            stat_type: change
            name: Dieses Jahr
            icon: mdi:transmission-tower-import
          - type: statistic
            entity: sensor.SYSTEM_NAME_einspeisevergutung
            period:
              calendar:
                period: year
            stat_type: change
            name: Dieses Jahr
      - type: grid
        cards:
          - type: heading
            heading: Monatliche Übersicht
            heading_style: title
            icon: mdi:cash-100
          - type: custom:apexcharts-card
            header:
              show: true
              title: Monatliche Stromkosten & Einspeisevergütung
            graph_span: 1year
            series:
              - entity: sensor.SYSTEM_NAME_stromkosten
                name: Stromkosten
                color: '#e53935'
                type: column
                statistics:
                  type: change
                  period: month
                unit: ' €'
                float_precision: 2
              - entity: sensor.SYSTEM_NAME_einspeisevergutung
                name: Einspeisevergütung
                color: '#43a047'
                type: column
                statistics:
                  type: change
                  period: month
                unit: ' €'
                float_precision: 2
            apex_config:
              chart:
                toolbar:
                  show: false
              plotOptions:
                bar:
                  borderRadius: 3
                  columnWidth: "60%"
              yaxis:
                forceNiceScale: true
                min: 0
