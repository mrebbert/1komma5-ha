name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Package and attach release archive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          cd custom_components
          zip -r ../onekommafive.zip onekommafive/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: onekommafive.zip
