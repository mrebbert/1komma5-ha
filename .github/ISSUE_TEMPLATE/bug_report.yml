name: Bug report
description: Report a problem with the 1KOMMA5° integration.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below — the more context you provide, the faster the issue can be diagnosed.

        > **Reminder:** This is an unofficial integration based on a reverse-engineered API. Backend changes by 1KOMMA5° can break things at any time without warning.

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      description: "Settings → Devices & Services → 1KOMMA5° → Info, or check `custom_components/onekommafive/manifest.json` (`version`)."
      placeholder: "e.g. 0.1.32"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: "Settings → About, or `Configuration → Info`."
      placeholder: "e.g. 2026.4.2"
    validations:
      required: true

  - type: input
    id: api_lib_version
    attributes:
      label: onekommafive Python library version (if known)
      description: "Run `pip show onekommafive` in your HA environment, or check the integration log."
      placeholder: "e.g. 0.1.15"

  - type: textarea
    id: hardware
    attributes:
      label: 1KOMMA5° system hardware
      description: "Which inverter, battery, EV charger, heat pump etc. is connected to your Heartbeat? Helps diagnose whether the issue is hardware-specific."
      placeholder: |
        - Inverter: ...
        - Battery: ...
        - Wallbox: ...
        - Heat pump: ...
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What is going wrong? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Paste the log entries from Settings → System → Logs (search for `onekommafive`) or `home-assistant.log`.
        For more verbose output, set the integration's log level to debug:
        ```yaml
        logger:
          logs:
            custom_components.onekommafive: debug
            onekommafive: debug
        ```
      render: text

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic sensor values (optional)
      description: |
        The integration ships three diagnostic timestamp sensors (hidden by default in HA):
        - `sensor.<system>_last_live_update`
        - `sensor.<system>_last_price_update`
        - `sensor.<system>_last_optimization_update`

        Their values help pin down which coordinator is failing.
      placeholder: |
        Last live update: 2026-04-26 17:22:00
        Last price update: 2026-04-26 16:00:00
        Last optimization update: never updated

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I am running the latest release of this integration.
          required: true
        - label: I have searched [existing issues](https://github.com/mrebbert/1komma5-ha/issues?q=is%3Aissue) for duplicates.
          required: true
